name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the workflow only reads the repo.
permissions:
  contents: read

# Cancel superseded runs for the same ref (saves CI minutes on rapid pushes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Spell check
        run: uv run codespell src tests README.md

      - name: Notebook outputs stripped
        run: uv run nbstripout --verify example/example_pipeline.ipynb

      - name: Pytest
        run: uv run pytest -q
